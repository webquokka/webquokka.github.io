<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Quokka Head -->
  <ellipse cx="100" cy="85" rx="55" ry="60" fill="#D4945E"/>
  
  <!-- Left Ear -->
  <ellipse cx="65" cy="35" rx="18" ry="30" fill="#D4945E"/>
  <ellipse cx="65" cy="38" rx="10" ry="20" fill="#F4D4A8"/>
  
  <!-- Right Ear -->
  <ellipse cx="135" cy="35" rx="18" ry="30" fill="#D4945E"/>
  <ellipse cx="135" cy="38" rx="10" ry="20" fill="#F4D4A8"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="75" r="8" fill="#000000"/>
  <circle cx="115" cy="75" r="8" fill="#000000"/>
  <circle cx="83" cy="73" r="3" fill="#FFFFFF"/>
  <circle cx="113" cy="73" r="3" fill="#FFFFFF"/>
  
  <!-- Cheeks -->
  <circle cx="65" cy="90" r="6" fill="#E8B89F" opacity="0.6"/>
  <circle cx="135" cy="90" r="6" fill="#E8B89F" opacity="0.6"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="95" rx="6" ry="5" fill="#000000"/>
  
  <!-- Smile -->
  <path d="M 85 100 Q 100 108 115 100" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="70" y="135" width="60" height="45" rx="10" fill="#D4945E"/>
</svg>